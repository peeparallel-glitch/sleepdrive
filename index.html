<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寝落ちドライブ - Languid Drive</title>
    <meta name="description" content="眠気を誘う、心地よい低速ドライブ体験。深夜の静かな道をただ進む。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-overlay" class="hidden">
            <div class="top-bar">
                <div class="timer-container">
                    <span class="label" data-i18n="UI_06">TIME LEFT</span>
                    <span id="main-timer">60.0</span>
                </div>
                <div class="counter-container">
                    <span class="label" data-i18n="POINTS">POINTS</span>
                    <span id="cp-counter">0</span>
                </div>
                <div class="total-time-container">
                    <span class="label" data-i18n="ELAPSED">ELAPSED</span>
                    <span id="total-time">00:00</span>
                </div>
            </div>

        </div>

        <div id="fade-overlay"></div>

        <div id="game-over-screen" class="hidden">
            <h1 data-i18n="UI_09">Last Night's Log</h1>
            <p data-i18n="UI_08">Sleep Well.</p>
            <p id="play-time-display" style="font-size: 1em; color: #e0e6ed; font-weight: 400; margin-bottom: 8px;"></p>
            <p id="sleep-time-display" style="font-size: 1.25em; color: #00ffea; font-weight: 500; margin-bottom: 24px; text-shadow: 0 0 10px rgba(0, 255, 234, 0.5);"></p>
            <button id="restart-btn" data-i18n="UI_01">Drive Again</button>
        </div>

        <div id="title-screen">
            <h1>Languid Drive</h1>
            <p data-i18n="TITLE_DESC">深夜の静寂へようこそ</p>
            <div style="margin-bottom: 24px; background: rgba(0,0,0,0.3); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                <span data-i18n="POINTS" style="font-size: 12px; color: #94a3b8; letter-spacing: 0.1em; display: block; margin-bottom: 4px;">TOTAL POINTS</span>
                <span id="total-points-display" style="font-size: 32px; color: #fbbf24; font-weight: 600; display: block; text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);">0</span>
            </div>
            <div style="margin-bottom: 24px;">
                <span data-i18n="BGM_VOLUME" style="font-size: 12px; color: #94a3b8; display: block; margin-bottom: 8px; letter-spacing: 0.05em;">BGM VOLUME</span>
                <input type="range" id="bgm-volume-slider" min="0" max="1" step="0.05" value="0.6" style="width: 100%; accent-color: #0ea5e9;">
            </div>
            <div class="menu-buttons" style="display: flex; flex-direction: column; gap: 12px; margin-top: 24px;">
                <button id="start-btn" data-i18n="UI_01">Drive Starts</button>
                <button id="shop-open-btn" data-i18n="SHOP" style="background: transparent; color: #00ffea; border: 1px solid #00ffea; font-size: 14px; padding: 10px 24px; border-radius: 100px; cursor: pointer; transition: 0.2s;">Shop</button>
                <button id="settings-open-btn" data-i18n="UI_02" style="background: transparent; color: #94a3b8; border: 1px solid #334155; font-size: 14px; padding: 10px 24px; border-radius: 100px; cursor: pointer; transition: 0.2s;">Settings</button>
                <button id="lang-open-btn" data-i18n="UI_12" style="background: transparent; color: #94a3b8; border: 1px solid #334155; font-size: 14px; padding: 10px 24px; border-radius: 100px; cursor: pointer; transition: 0.2s;">Language</button>
            </div>
        </div>

        <!-- Shop Modal -->
        <div id="shop-modal" class="hidden">
            <h2 data-i18n="SHOP" style="font-size: 20px; margin-bottom: 16px; color: #fff;">Shop</h2>
            <div style="margin-bottom: 24px; text-align: left;">
                <label data-i18n="UI_04" style="font-size: 12px; color: #94a3b8; display: block; margin-bottom: 8px;">Choose Vehicle</label>
                <div id="shop-items" style="max-height: 200px; overflow-y: auto; padding-right: 8px;">
                    <!-- Items generated by JS -->
                </div>
            </div>
            <button id="shop-close-btn" data-i18n="CLOSE" style="background: var(--text-primary); color: #000; border: none; padding: 12px 32px; border-radius: 100px; font-weight: 600; cursor: pointer;">Close</button>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden">
            <h2 data-i18n="UI_02" style="font-size: 20px; margin-bottom: 16px; color: #fff;">Settings</h2>
            <div style="margin-bottom: 24px; text-align: left;">
                <label data-i18n="BGM_SELECT" style="font-size: 12px; color: #94a3b8; display: block; margin-bottom: 8px;">BGM SELECT</label>
                <select id="bgm-select" style="width: 100%; padding: 8px; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #fff; border: 1px solid #334155; outline: none; cursor: pointer;">
                    <option value="Midnight piano.mp3">Midnight piano</option>
                    <option value="Forest gitar.mp3">Forest gitar</option>
                    <option value="Soft Rain jaz piano.mp3">Soft Rain jaz piano</option>
                </select>
            </div>
            <button id="settings-close-btn" data-i18n="CLOSE" style="background: var(--text-primary); color: #000; border: none; padding: 12px 32px; border-radius: 100px; font-weight: 600; cursor: pointer;">Close</button>
        </div>

        <!-- Language Modal -->
        <div id="lang-modal" class="hidden">
            <h2 data-i18n="UI_12" style="font-size: 20px; margin-bottom: 16px; color: #fff;">Language</h2>
            <div style="margin-bottom: 24px; text-align: left;">
                <select id="lang-select" style="width: 100%; padding: 8px; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #fff; border: 1px solid #334155; outline: none; cursor: pointer;">
                    <option value="ja">日本語</option>
                    <option value="en">English</option>
                    <option value="zh">中文 (简体)</option>
                    <option value="ko">한국어</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                </select>
            </div>
            <button id="lang-close-btn" data-i18n="CLOSE" style="background: var(--text-primary); color: #000; border: none; padding: 12px 32px; border-radius: 100px; font-weight: 600; cursor: pointer;">Close</button>
        </div>
    </div>

    <script src="game.js" defer></script>
</body>

</html>
